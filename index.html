<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Il Caminetto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <div id="fireplace">
      <div id="mantel"></div>

      <div id="firebox">
        <div id="bricks-container"></div>
        <canvas id="canvas"></canvas>

        <div id="logs-container">
          <div class="log log1"></div>
          <div class="log log2"></div>
          <div class="log log3"></div>
          <div class="log log4"></div>
          <div class="log log5"></div>
        </div>

        <div id="fire-container" class="hidden">
          <div class="flame flame1"></div>
          <div class="flame flame2"></div>
          <div class="flame flame3"></div>
          <div class="flame flame4"></div>
          <div class="flame flame5"></div>
          <div class="ember ember1"></div>
          <div class="ember ember2"></div>
          <div class="ember ember3"></div>
        </div>

        <div id="orb" class="hidden"></div>
      </div>

      <div id="hearth"></div>
    </div>

    <div id="tools">
      <div class="tool tool-poker"></div>
      <div class="tool tool-shovel"></div>
      <div class="tool tool-tongs"></div>
    </div>

    <div id="message"></div>
    <button id="clear-btn">Cancella</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
