<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Caminetto</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="scene">
    <div id="mantel"></div>
    <div id="fireplace">
      <div class="brick bt bt1"></div>
      <div class="brick bt bt2"></div>
      <div class="brick bt bt3"></div>
      <div class="brick bl bl1"></div>
      <div id="hearth">
        <div id="soot"></div>
        <div id="glow"></div>
        <div class="log log1"><span class="grain"></span></div>
        <div class="log log2"><span class="grain"></span></div>
        <div class="log log3"><span class="grain"></span></div>
        <div class="log log4"><span class="grain"></span></div>
        <div class="log log5"><span class="grain"></span></div>
        <div id="ash"></div>
        <div id="prompt">Sai come accendermi</div>
        <canvas id="drawCanvas"></canvas>
      </div>
      <div class="brick br br1"></div>
      <div class="brick bl bl2"></div>
      <div class="brick br br2"></div>
      <div class="brick bb bb1"></div>
      <div class="brick bb bb2"></div>
      <div class="brick bb bb3"></div>
    </div>
    <div id="tools">
      <div class="tool poker"></div>
      <div class="tool brush"></div>
      <div class="tool shovel"></div>
      <div class="tool-base"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
